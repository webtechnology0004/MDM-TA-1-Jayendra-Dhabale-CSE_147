<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="background-image: url('adminbg.jpg');">

    <nav class="navbar">
        <div class="logo">FLOWERENCE</div>
        <div class="nav-links">
            <a href="#">Home</a>
            <div class="dropdown">
                <button class="dropbtn">Admin Profile ▼</button>
                <div class="dropdown-content">
                    <a href="#">Edit Profile</a>
                    <a href="#">Change Password</a>
                    <a href="#">Add Employee</a>
                    <a href="#">Log Out</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="profile-card">
            <div class="profile-title">PROFILE</div>
            <div class="profile-info">
                <div class="info-group"><span>ID:</span> 12345678</div>
                <div class="info-group"><span>NAME:</span> John Doe</div>
                <div class="info-group"><span>EMAIL ID:</span> admin@example.com</div>
                <div class="info-group"><span>PHONE:</span> +1 234 567 890</div>
                <div class="info-group"><span>WPPS ID:</span> WPPS-9876</div>
                <div class="info-group"><span>ADDRESS:</span> 123 Admin Block, Main Street, City</div>
                <div class="info-group"><span>DESIGNATION:</span> Administrator</div>
                <div class="info-group"><span>SALARY:</span> $80,000</div>
                <button class="update-btn">UPDATE</button>
            </div>
            <div class="profile-image-container">
                <img src="admin.png" alt="Admin Profile">
            </div>
        </div>
    </div>

</body>
</html>
