<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="background-image: url('doctorbg.jpg');">

    <nav class="navbar">
        <div class="logo">FLOWERENCE</div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Contact</a>
            <div class="dropdown">
                <button class="dropbtn">👤 ▼</button>
                <div class="dropdown-content">
                    <a href="#">Settings</a>
                    <a href="#">Log Out</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="profile-card">
            <div class="profile-title">PROFILE</div>
            <div class="profile-info">
                <div class="info-group"><span>ID:</span> DOC-5544</div>
                <div class="info-group"><span>NAME:</span> Dr. Smith</div>
                <div class="info-group"><span>EMAIL ID:</span> doctor@example.com</div>
                <div class="info-group"><span>PHONE:</span> +1 987 654 321</div>
                <div class="info-group"><span>WPPS ID:</span> WPPS-1122</div>
                <div class="info-group"><span>ADDRESS:</span> 45 Clinic Ave, Medical District</div>
                <div class="info-group"><span>DESIGNATION:</span> Cardiologist</div>
                <div class="info-group"><span>SALARY:</span> $120,000</div>
                <button class="update-btn">UPDATE</button>
            </div>
            <div class="profile-image-container">
                <img src="doctor.jpg" alt="Doctor Profile">
            </div>
        </div>
    </div>

</body>
</html>
